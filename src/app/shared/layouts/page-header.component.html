<div [ngClass]="['flex items-center justify-between mb-6', className]">
      <div class="flex items-center gap-4">
        <button
          *ngIf="backRoute"
          class="inline-flex items-center justify-center rounded-md text-sm font-medium h-9 w-9 border border-input bg-background shadow-sm hover:bg-accent hover:text-accent-foreground"
          (click)="goBack()"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        </button>
        <div>
          <h1 class="text-2xl font-bold tracking-tight">{{ title }}</h1>
          <p *ngIf="subtitle" class="text-muted-foreground mt-1">{{ subtitle }}</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <ng-content />
        <button
          *ngIf="showLogout"
          class="inline-flex items-center justify-center gap-2 rounded-md text-sm font-medium h-9 px-3 border border-input bg-background shadow-sm hover:bg-red-50 hover:text-red-600 hover:border-red-200 transition-colors"
          (click)="logout()"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/>
          </svg>
          Logout
        </button>
      </div>
    </div>
